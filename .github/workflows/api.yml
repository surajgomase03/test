name: api

on:
  pull_request:
    paths:
      - "services/api/**"
jobs:
   Test:
     runs-on: ubuntu-latest
     steps:
       - name: CheckOut Code
         uses: actions/checkout@v4
      
       - name: Setup Node
         uses: actions/setup-node@v4
         with:
            node-version: 20 
            cache: npm
            cache-dependency-path: services/api/package.json

       - name: Install Dependencies
         run: npm ci
       
       - name: Test the code
         run: npm run test

       - name: Lint Code
         run: npm run lint

    